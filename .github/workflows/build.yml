name: Build debug APK

# Run on every push, and allow a manual "Run workflow" button in the Actions tab.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the repository onto the runner.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (Temurin) — required by Android Gradle Plugin 8.7.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Android SDK command-line tools (sdkmanager) + license acceptance.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Make sure the exact SDK pieces compileSdk 35 needs are present.
      - name: Install SDK platform 35 + build-tools
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # 5. The Gradle project lives in android/; make the wrapper executable.
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android

      # 6. Build the debug APK (auto debug-signed).
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android

      # 7. Publish the APK as a downloadable artifact (Actions run -> Artifacts).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vali-pilot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
